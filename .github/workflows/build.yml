name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpu:
    name: cpu (gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build (CPU)
        run: make cpu

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: main-cpu
          path: main

  cuda:
    name: cuda (nvcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.5.0'
          method: network
          sub-packages: '["nvcc", "cudart-dev"]'

      - name: Build (GPU)
        run: make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: main-cuda
          path: main
